services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contaminapp
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/contaminapp
      - JWT_SECRET
      - BACKEND_URL
      - RESEND_KEY
    ports:
      - "3000:3000"
    volumes:
      - ./migrations:/app/migrations:ro

volumes:
  db-data:
